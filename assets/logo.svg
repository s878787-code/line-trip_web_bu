<svg width="360" height="80" viewBox="0 0 360 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TripRadar 車趟輔助">
  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC760"/>
      <stop offset="0.5" stop-color="#FFB23E"/>
      <stop offset="1" stop-color="#FF8A2B"/>
    </linearGradient>
    <radialGradient id="sweepGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFB23E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFB23E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 雷達 mark -->
  <g transform="translate(40,40)">
    <!-- 掃描扇形 -->
    <path d="M0 0 L28 -14 A31 31 0 0 1 30 8 Z" fill="url(#sweepGrad)"/>
    <!-- 外圈 -->
    <circle cx="0" cy="0" r="31" stroke="url(#tealGrad)" stroke-width="2.4"/>
    <!-- 內圈 -->
    <circle cx="0" cy="0" r="19" stroke="#FFB23E" stroke-width="1.2" opacity="0.42"/>
    <circle cx="0" cy="0" r="8" stroke="#FFB23E" stroke-width="1.1" opacity="0.28"/>
    <!-- 掃描線 -->
    <path d="M0 0 L29 -14.5" stroke="url(#tealGrad)" stroke-width="2.6" stroke-linecap="round"/>
    <!-- 中心點 -->
    <circle cx="0" cy="0" r="2.6" fill="#FFB23E"/>
    <!-- LINE 綠 blip -->
    <circle cx="11" cy="12" r="3.4" fill="#06C755"/>
  </g>

  <!-- 字標 -->
  <text x="90" y="42" font-family="Sora, 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5" fill="#F2F6F8">Trip<tspan fill="url(#tealGrad)">Radar</tspan></text>
  <text x="91" y="63" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="14" font-weight="500" letter-spacing="3" fill="#93A4B0">車趟輔助</text>
</svg>
